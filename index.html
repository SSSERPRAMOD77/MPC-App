<script>
    // 1. YOUR NEW URL HERE
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwtJTNBf7hx3dStmOZ-zLnRa3zdn5h3QyzqeR2rzEIta_TJgzNiZqcZGj8mnTKw4p9T/exec';
    let mpcData = [];

    // 2. THIS FUNCTION RECEIVES THE DATA FROM GOOGLE
    window.handleMPCData = function(data) {
        mpcData = data;
        const select = document.getElementById('mpc_select');
        
        if (data.length === 0) {
            select.innerHTML = '<option value="">No MPCs found in Sheet</option>';
            return;
        }

        select.innerHTML = '<option value="">-- Select MPC Number --</option>';
        data.forEach(item => {
            let opt = document.createElement('option');
            opt.value = item.number;
            opt.innerText = item.number;
            select.appendChild(opt);
        });
    };

    // 3. THIS LOADS THE DATA BY CALLING GOOGLE
    function loadMPCs() {
        const script = document.createElement('script');
        // We add a timestamp to prevent the phone from showing "old" data
        script.src = scriptURL + "?t=" + new Date().getTime();
        document.body.appendChild(script);
    }

    // Load as soon as the page opens
    window.onload = loadMPCs;

    // 4. AUTO-SET HIDDEN CODE WHEN SELECTION CHANGES
    function autoFetchCode() {
        const selectedNum = document.getElementById('mpc_select').value;
        const found = mpcData.find(x => x.number === selectedNum);
        if(found) {
            document.getElementById('hidden_mpc_code').value = found.code;
        }
    }

    // Rest of your Logic (toggleBV, checkRegistration, etc.) remains same...
</script>
